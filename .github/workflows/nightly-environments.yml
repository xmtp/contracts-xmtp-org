name: Nightly Automation
on:
    schedule:
        - cron: "0 10 * * *"
    workflow_dispatch:

jobs:
    nightly-environments:
        permissions:
            contents: write
            pull-requests: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Update Environments
              run: |
                  export UPDATE_BRANCH=main
                  dev/nightly-environments

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v7
              with:
                  commit-message: Nightly Environments
                  title: Update Environments
                  body: |
                      - Nightly Environments Update

                      Auto-generated by [create-pull-request][1]

                      [1]: https://github.com/peter-evans/create-pull-request
                  branch: nightly-environments
                  add-paths: |
                      config/environments/
                      config/params/
