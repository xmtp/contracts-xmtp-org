<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XMTP Contract Admin</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        --bg: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #1c2333;
        --border: #30363d;
        --text: #e6edf3;
        --text-dim: #8b949e;
        --text-bright: #ffffff;
        --accent: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --amber: #d29922;
        --purple: #bc8cff;
        --tab-active: #58a6ff;
        --mono:
          "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas,
          monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      /* Brand Header */
      .brand-header {
        background: #09090b;
        border-bottom: 1px solid rgba(63, 63, 70, 0.5);
        padding: 16px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .brand-logo {
        height: 24px;
      }
      .brand-label {
        font-size: 13px;
        font-family: var(--mono);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #a1a1aa;
      }

      /* Tabs */
      .tabs {
        display: flex;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        gap: 0;
      }
      .tab {
        padding: 12px 20px;
        cursor: pointer;
        color: var(--text-dim);
        font-size: 14px;
        font-weight: 500;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        user-select: none;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--tab-active);
        border-bottom-color: var(--tab-active);
      }

      /* Content */
      .content {
        padding: 24px;
        max-width: 1600px;
        margin: 0 auto;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      /* Loading */
      .loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-dim);
        padding: 40px 0;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Tables */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
      }
      th {
        text-align: left;
        padding: 6px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        vertical-align: middle;
        line-height: 22px;
      }
      tr:hover td {
        background: var(--bg-hover);
      }

      .chain-header {
        background: var(--bg-card) !important;
        font-weight: 600;
        color: var(--purple);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .chain-header td {
        padding: 5px 12px;
      }

      /* Version cells */
      .version {
        font-family: var(--mono);
        font-size: 16px;
      }
      .version-match {
        color: var(--green);
      }
      .version-mismatch {
        color: var(--amber);
        background: rgba(210, 153, 34, 0.08);
      }
      .version-latest {
        color: var(--green);
        background: rgba(63, 185, 80, 0.08);
      }
      .version-na {
        color: var(--text-dim);
      }
      .version-clickable {
        cursor: pointer;
      }
      .version-clickable:hover {
        text-decoration: underline;
      }
      .balance-link {
        text-decoration: none;
        color: inherit;
      }
      .balance-link:hover {
        text-decoration: underline;
      }

      /* Addresses */
      .addr {
        font-family: var(--mono);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .addr a {
        color: var(--accent);
        text-decoration: none;
      }
      .addr a:hover {
        text-decoration: underline;
      }
      .copy-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-dim);
        opacity: 0.4;
        transition: opacity 0.15s;
        padding: 2px;
        font-size: 13px;
        line-height: 1;
      }
      .copy-btn:hover {
        opacity: 1;
        color: var(--accent);
      }
      .copy-btn.copied {
        opacity: 1;
        color: var(--green);
      }

      /* Status badges */
      .badge-match {
        display: inline-block;
        background: rgba(63, 185, 80, 0.15);
        color: var(--green);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
      }
      .badge-drift {
        display: inline-block;
        background: rgba(248, 81, 73, 0.15);
        color: var(--red);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
      }

      /* Contract Inspector */
      .inspector-controls {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        align-items: center;
      }
      .inspector-controls select {
        padding-top: 10px;
        padding-bottom: 10px;
      }
      select {
        background: var(--bg-card);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        outline: none;
      }
      select:focus {
        border-color: var(--accent);
      }
      optgroup {
        color: var(--text-dim);
      }

      .detail-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .detail-card-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        font-size: 16px;
        color: var(--text-bright);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .detail-card-body {
        padding: 0;
      }
      .detail-row {
        display: flex;
        border-bottom: 1px solid var(--border);
        font-size: 16px;
      }
      .detail-row:last-child {
        border-bottom: none;
      }
      .detail-key {
        width: 220px;
        min-width: 220px;
        padding: 10px 18px;
        color: var(--text-dim);
        background: rgba(0, 0, 0, 0.15);
        font-weight: 500;
      }
      .detail-val {
        flex: 1;
        padding: 10px 18px;
        font-family: var(--mono);
        font-size: 16px;
        word-break: break-all;
      }

      /* Drift selectors (temporarily disabled)
      .drift-controls {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        align-items: center;
      }
      .drift-section-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-bright);
        margin: 24px 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .drift-section-title:first-child {
        margin-top: 0;
      }
      .drift-summary {
        font-size: 12px;
        color: var(--text-dim);
        font-weight: 400;
      }
      */

      /* Button */
      .btn {
        background: var(--bg-card);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        transition: all 0.15s;
      }
      .btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent);
      }

      /* Contract name in tables */
      .contract-name {
        font-weight: 400;
        font-size: 16px;
        color: var(--text-bright);
        line-height: 22px;
      }

      /* Boolean indicators */
      .bool-true {
        color: var(--amber);
      }
      .bool-false {
        color: var(--green);
      }

      /* Read proxy link */
      .read-proxy-link {
        margin-left: 12px;
        font-size: 11px;
        color: var(--text-dim);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 4px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .read-proxy-link:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Responsive */
      .table-wrapper {
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <a href="/" class="brand-header" style="text-decoration: none">
      <img src="/xmtp-logo-white.svg" alt="XMTP" class="brand-logo" />
      <span class="brand-label">Contract Admin</span>
    </a>

    <div class="tabs">
      <div class="tab active" data-tab="status">Contract Status</div>
      <div class="tab" data-tab="inspector">Contract Inspector</div>
      <div class="tab" data-tab="balances">Balances</div>
      <!-- <div class="tab" data-tab="drift">Config Drift</div> -->
    </div>

    <div class="content">
      <!-- Version Matrix -->
      <div class="panel active" id="panel-status">
        <div class="loading" id="status-loading">
          <div class="spinner"></div>
          Loading contract status...
        </div>
        <div class="detail-card" id="status-card" style="display: none">
          <div class="detail-card-header">Contract Versions</div>
          <div class="detail-card-body">
            <div class="table-wrapper">
              <table id="status-table"></table>
            </div>
          </div>
        </div>
      </div>

      <!-- Contract Inspector -->
      <div class="panel" id="panel-inspector">
        <div class="inspector-controls">
          <select id="inspector-env">
            <option value="" disabled selected>Select environment...</option>
          </select>
          <select id="inspector-contract" disabled>
            <option value="" disabled selected>Select contract...</option>
          </select>
        </div>
        <div id="inspector-result"></div>
      </div>

      <!-- Balances -->
      <div class="panel" id="panel-balances">
        <div class="loading" id="balances-loading">
          <div class="spinner"></div>
          Loading balances...
        </div>
        <div id="balances-result"></div>
      </div>

      <!-- Config Drift (temporarily disabled)
      <div class="panel" id="panel-drift">
        <div class="drift-controls">
          <select id="drift-env">
            <option value="" disabled selected>Select environment...</option>
          </select>
        </div>
        <div id="drift-result"></div>
      </div>
      -->
    </div>

    <script>
      // ---- Utilities ----

      function escapeHtml(str) {
        if (str === null || str === undefined) return "";
        const div = document.createElement("div");
        div.textContent = String(str);
        return div.innerHTML;
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add("copied");
          btn.textContent = "\u2713";
          setTimeout(() => {
            btn.classList.remove("copied");
            btn.textContent = "\u2398";
          }, 1500);
        });
      }

      function renderAddress(address, explorerUrl) {
        if (!address) return '<span style="color:var(--text-dim)">-</span>';
        const link = explorerUrl
          ? `<a href="${explorerUrl}/address/${address}" target="_blank" rel="noopener">${address}</a>`
          : address;
        return `<span class="addr">${link}<button class="copy-btn" onclick="copyToClipboard('${address}', this)" title="Copy">\u2398</button></span>`;
      }

      function formatBigValue(val) {
        if (val === null || val === undefined) return "-";
        if (typeof val === "boolean" || val === "true" || val === "false") {
          const b = val === true || val === "true";
          return `<span class="${b ? "bool-true" : "bool-false"}">${escapeHtml(val)}</span>`;
        }
        if (
          typeof val === "string" &&
          val.startsWith("0x") &&
          val.length === 42
        ) {
          return renderAddress(val);
        }
        return `<span style="font-family:var(--mono);font-size:12px">${escapeHtml(val)}</span>`;
      }

      function formatTokenAmount(rawVal, decimals) {
        if (rawVal === null || rawVal === undefined) return null;
        try {
          const n = BigInt(rawVal);
          if (decimals === null || decimals === undefined) return n.toString();
          const isNeg = n < 0n;
          const abs = isNeg ? -n : n;
          const d = 10n ** BigInt(decimals);
          const whole = abs / d;
          const frac = abs % d;
          const fracStr = frac.toString().padStart(decimals, "0").replace(/0+$/, "");
          const formatted = fracStr ? `${whole}.${fracStr}` : whole.toString();
          return isNeg ? `-${formatted}` : formatted;
        } catch {
          return rawVal.toString();
        }
      }

      // Compare semver strings: returns -1, 0, or 1
      function compareSemver(a, b) {
        const pa = a.split(".").map(Number);
        const pb = b.split(".").map(Number);
        for (let i = 0; i < 3; i++) {
          if ((pa[i] || 0) > (pb[i] || 0)) return 1;
          if ((pa[i] || 0) < (pb[i] || 0)) return -1;
        }
        return 0;
      }

      function toggleUnsetParams(checkbox) {
        const card = checkbox.closest(".detail-card");
        const rows = card.querySelectorAll(
          '.detail-row[data-param-unset="true"]',
        );
        for (const row of rows) {
          row.style.display = checkbox.checked ? "none" : "";
        }
      }

      function formatEth(rawWei) {
        if (rawWei === null || rawWei === undefined) {
          return '<span style="color:var(--text-dim)">—</span>';
        }
        try {
          const val = Number(BigInt(rawWei)) / 1e18;
          const color = val === 0 ? "var(--text-dim)" : "var(--green)";
          return `<span style="font-family:var(--mono);font-size:16px;color:${color}">${val.toFixed(6)}</span>`;
        } catch {
          return '<span style="color:var(--red)">err</span>';
        }
      }

      function formatToken(rawAmount, decimals) {
        if (rawAmount === null || rawAmount === undefined) {
          return '<span style="color:var(--text-dim)">—</span>';
        }
        try {
          const divisor = Math.pow(10, decimals || 6);
          const val = Number(BigInt(rawAmount)) / divisor;
          const color = val === 0 ? "var(--text-dim)" : "var(--green)";
          return `<span style="font-family:var(--mono);font-size:16px;color:${color}">${val.toFixed(6)}</span>`;
        } catch {
          return '<span style="color:var(--red)">err</span>';
        }
      }

      // ---- State ----
      let meta = null;

      // ---- URL hash state ----
      const VALID_TABS = new Set(["status", "inspector", "balances"]);

      function updateHash(push) {
        const activeTab = document.querySelector(".tab.active");
        const tab = activeTab ? activeTab.dataset.tab : "status";
        const params = new URLSearchParams();
        params.set("tab", tab);
        if (tab === "inspector") {
          const env = document.getElementById("inspector-env").value;
          const contract = document.getElementById("inspector-contract").value;
          if (env) params.set("env", env);
          if (contract) params.set("contract", contract);
        }
        const url = "#" + params.toString();
        if (push) {
          history.pushState(null, "", url);
        } else {
          history.replaceState(null, "", url);
        }
      }

      function getHashParams() {
        const hash = location.hash.slice(1);
        return new URLSearchParams(hash);
      }

      window.addEventListener("popstate", () => {
        const params = getHashParams();
        const tab = params.get("tab") || "status";
        switchToTab(VALID_TABS.has(tab) ? tab : "status");
        if (tab === "inspector") {
          const env = params.get("env");
          const contract = params.get("contract");
          if (env) {
            document.getElementById("inspector-env").value = env;
            populateContractDropdown(env);
            if (contract) {
              document.getElementById("inspector-contract").value = contract;
              loadContractDetails();
            }
          }
        }
      });

      // ---- Tab switching ----
      function switchToTab(tabName) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".panel")
          .forEach((p) => p.classList.remove("active"));
        const tabEl = document.querySelector(`.tab[data-tab="${tabName}"]`);
        if (tabEl) {
          tabEl.classList.add("active");
          document.getElementById(`panel-${tabName}`).classList.add("active");
        }
        if (tabName === "status" && !versionsLoaded) loadVersions();
        if (tabName === "balances" && !balancesLoaded) loadBalances();
      }

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          switchToTab(tab.dataset.tab);
          updateHash(true);
        });
      });

      // ---- Version Matrix ----
      let versionsLoaded = false;

      async function loadVersions() {
        const loading = document.getElementById("status-loading");
        const table = document.getElementById("status-table");
        const card = document.getElementById("status-card");
        loading.style.display = "flex";
        card.style.display = "none";

        try {
          const [metaResp, versionsResp, pausedResp] = await Promise.all([
            fetch("/api/meta").then((r) => r.json()),
            fetch("/api/versions").then((r) => r.json()),
            fetch("/api/paused").then((r) => r.json()),
          ]);
          meta = metaResp;
          renderVersionMatrix(metaResp, versionsResp, pausedResp);
          populateSelectors(metaResp);
          versionsLoaded = true;
        } catch (err) {
          loading.innerHTML = `<span style="color:var(--red)">Error: ${escapeHtml(err.message)}</span>`;
        }
      }

      function renderVersionMatrix(metaData, versions, pausedData) {
        const envs = metaData.environments;
        const table = document.getElementById("status-table");
        const loading = document.getElementById("status-loading");
        let totalDiffs = 0;

        // Build header
        let html = `<thead><tr><th style="min-width:260px">Contract</th>`;
        for (const env of envs) {
          html += `<th style="text-align:center">${env}</th>`;
        }
        html += `<th style="text-align:center">Version Status</th>`;
        html += `</tr></thead><tbody>`;

        function renderContractRow(name, chain, envs, versions, pausedData) {
          const versionValues = envs.map((env) => {
            const chainData = versions[env]?.[chain];
            return chainData?.[name] || null;
          });
          const nonNull = versionValues.filter((v) => v !== null);
          const allSame =
            nonNull.length > 0 && nonNull.every((v) => v === nonNull[0]);
          const maxVersion =
            nonNull.length > 0
              ? nonNull.reduce((a, b) => (compareSemver(a, b) >= 0 ? a : b))
              : null;

          if (!allSame && nonNull.length > 1) totalDiffs++;

          html += `<tr><td class="contract-name">${name}</td>`;
          for (let i = 0; i < envs.length; i++) {
            const v = versionValues[i];
            const env = envs[i];
            const paused = pausedData[env]?.[chain]?.[name] ?? null;
            const pausedHtml =
              paused === true
                ? '<br><span class="badge-drift">Paused</span>'
                : paused === false
                  ? '<br><span class="badge-match">Unpaused</span>'
                  : "";
            if (v === null) {
              html += `<td style="text-align:center"><span class="version version-na">-</span>${pausedHtml}</td>`;
            } else if (allSame) {
              html += `<td style="text-align:center"><span class="version version-match version-clickable" onclick="navigateToContract('${env}','${chain}','${name}')">${v}</span>${pausedHtml}</td>`;
            } else {
              const isLatest = compareSemver(v, maxVersion) === 0;
              const cls = isLatest ? "version-latest" : "version-mismatch";
              html += `<td style="text-align:center"><span class="version ${cls} version-clickable" onclick="navigateToContract('${env}','${chain}','${name}')">${v}</span>${pausedHtml}</td>`;
            }
          }
          // Status column
          if (nonNull.length === 0) {
            html += `<td style="text-align:center"><span class="version version-na">-</span></td>`;
          } else if (allSame) {
            html += `<td style="text-align:center"><span class="badge-match">Match</span></td>`;
          } else {
            html += `<td style="text-align:center"><span class="badge-drift">Difference</span></td>`;
          }
          html += `</tr>`;
        }

        // Settlement chain contracts
        html += `<tr class="chain-header"><td colspan="${envs.length + 2}">Settlement Chain (Base L2)</td></tr>`;
        const settlementContracts = [
          ...metaData.meta[envs[0]].settlement.contracts,
        ].sort();
        for (const name of settlementContracts) {
          renderContractRow(name, "settlement", envs, versions, pausedData);
        }

        // App chain contracts
        html += `<tr class="chain-header"><td colspan="${envs.length + 2}">App Chain (XMTP L3)</td></tr>`;
        const appContracts = [...metaData.meta[envs[0]].app.contracts].sort();
        for (const name of appContracts) {
          renderContractRow(name, "app", envs, versions, pausedData);
        }

        html += `</tbody>`;
        table.innerHTML = html;
        loading.style.display = "none";
        document.getElementById("status-card").style.display = "";
        return totalDiffs;
      }

      // ---- Contract Inspector ----
      let selectorsPopulated = false;
      function populateSelectors(m) {
        if (selectorsPopulated) return;
        selectorsPopulated = true;
        const envSelect = document.getElementById("inspector-env");
        // const driftEnvSelect = document.getElementById("drift-env");
        for (const env of m.environments) {
          envSelect.appendChild(new Option(env, env));
          // driftEnvSelect.appendChild(new Option(env, env));
        }
      }

      function populateContractDropdown(envName, preserveSelection) {
        const contractSelect = document.getElementById("inspector-contract");
        const previousVal = contractSelect.value;

        // Clear existing options (innerHTML removes optgroups too)
        contractSelect.innerHTML = "";
        const placeholder = new Option("Select contract...", "");
        placeholder.disabled = true;
        placeholder.selected = true;
        contractSelect.appendChild(placeholder);

        if (!envName || !meta) {
          contractSelect.disabled = true;
          return;
        }

        const envMeta = meta.meta[envName];

        const settlementGroup = document.createElement("optgroup");
        settlementGroup.label = "Settlement Chain";
        for (const name of [...envMeta.settlement.contracts].sort()) {
          settlementGroup.appendChild(new Option(name, `settlement:${name}`));
        }
        contractSelect.appendChild(settlementGroup);

        const appGroup = document.createElement("optgroup");
        appGroup.label = "App Chain";
        for (const name of [...envMeta.app.contracts].sort()) {
          appGroup.appendChild(new Option(name, `app:${name}`));
        }
        contractSelect.appendChild(appGroup);

        contractSelect.disabled = false;

        // Restore previous contract selection if switching envs
        if (preserveSelection && previousVal) {
          contractSelect.value = previousVal;
        }
      }

      function autoLoadIfReady() {
        const env = document.getElementById("inspector-env").value;
        const contractVal = document.getElementById("inspector-contract").value;
        if (env && contractVal) loadContractDetails();
      }

      document
        .getElementById("inspector-env")
        .addEventListener("change", function () {
          populateContractDropdown(this.value, true);
          autoLoadIfReady();
          updateHash();
        });

      document
        .getElementById("inspector-contract")
        .addEventListener("change", function () {
          autoLoadIfReady();
          updateHash();
        });

        try {
          const data = await fetch(
            `/api/contract/${env}/${chain}/${name}`,
          ).then((r) => r.json());
          if (data.error) {
            resultDiv.innerHTML = `<p style="color:var(--red)">${escapeHtml(data.error)}</p>`;
            return;
          }
          renderContractDetails(data, resultDiv);
        } catch (err) {
          resultDiv.innerHTML = `<p style="color:var(--red)">Error: ${escapeHtml(err.message)}</p>`;
        }
      }

        if (data.state) {

      <div class="detail-card-header">Storage State</div>

          // Last payer reports per originator
          if (lastPayerReports && lastPayerReports.length > 0) {

            <th>Node IDs</th>

            for (const r of lastPayerReports) {

          } else if (

      </div></div>`;

          // Registry Overview card (PayerRegistry global financials)

            const fmtToken = (val, color) => {

            const lockPeriodDisplay = withdrawLockPeriod !== undefined && withdrawLockPeriod !== null

                  const days = Math.floor(secs / 86400);

                  const parts = [];
                  if (days) parts.push(`${days}d`);
                  if (hrs) parts.push(`${hrs}h`);
                  if (!parts.length) parts.push(`${secs}s`);
                  return `<span style="font-family:var(--mono);font-size:13px">${escapeHtml(parts.join(" "))} <span style="color:var(--text-dim)">(${escapeHtml(withdrawLockPeriod.toString())}s)</span></span>`;

          <div><strong style="color:var(--text)">totalDebt</strong>: <span style="font-family:var(--mono)">+ settlements &minus; deposits &minus; cancelled withdrawals</span>. Non-zero means some payers are in deficit.</div>

        </div>
        <div class="detail-row"><div class="detail-key">Total Deposits</div><div class="detail-val">${fmtToken(totalDeposits, tdColor)}${fnBadge}<span style="color:var(--text-dim);font-size:11px;margin-left:8px">net of settlements &amp; withdrawals, signed</span></div></div>
        <div class="detail-row"><div class="detail-key">Total Debt</div><div class="detail-val">${fmtToken(totalDebt, totalDebt && BigInt(totalDebt) > 0n ? "var(--amber)" : null)}${fnBadge}<span style="color:var(--text-dim);font-size:11px;margin-left:8px">sum of negative balances</span></div></div>

        <div class="detail-row"><div class="detail-key">Excess</div><div class="detail-val">${fmtToken(excess, excess && BigInt(excess) > 0n ? "var(--green)" : null)}${fnBadge}<span style="color:var(--text-dim);font-size:11px;margin-left:8px">earned fees available to sweep</span></div></div>
        <div class="detail-row"><div class="detail-key">Minimum Deposit</div><div class="detail-val">${fmtToken(minimumDeposit)}${fnBadge}</div></div>

      </div></div>`;
          }

          // Payers table
          if (payers && payers.length > 0) {

            const sym = payerDecimals !== null ? " xUSD" : "";
            const fmtAmt = (val) => {
              const s = formatTokenAmount(val, payerDecimals);
              return s !== null ? `<span style="font-family:var(--mono);font-size:12px">${escapeHtml(s)}${sym}</span>` : '<span style="color:var(--text-dim)">-</span>';
            };
            const sortedPayers = [...payers].sort((a, b) => {
              const ba = BigInt(a.balance ?? "0");
              const bb = BigInt(b.balance ?? "0");
              return ba < bb ? -1 : ba > bb ? 1 : 0;
            });
            html += `<div class="detail-card">
      <div class="detail-card-header">Payers <span style="color:var(--text-dim);font-weight:400;font-size:12px">${payers.length} payer${payers.length !== 1 ? "s" : ""}</span></div>
      <div class="detail-card-body"><div class="table-wrapper">
        <table style="margin:0">
          <thead><tr>

            <th>Total Settled ${calcBadge}</th>
            <th>Pending Withdrawal ${fnBadge}</th>

            for (const p of sortedPayers) {

              const balDisplay = balStr !== null

      // ---- Balances ----
      let balancesLoaded = false;

      async function loadBalances() {
        const loading = document.getElementById("balances-loading");
        const result = document.getElementById("balances-result");
        loading.style.display = "flex";
        result.innerHTML = "";

        try {
          const [metaResp, balancesData] = await Promise.all([
            meta
              ? Promise.resolve(meta)
              : fetch("/api/meta").then((r) => r.json()),
            fetch("/api/balances").then((r) => r.json()),
          ]);
          if (!meta) meta = metaResp;
          if (balancesData.error) throw new Error(balancesData.error);
          renderBalances(balancesData, result);
          balancesLoaded = true;
        } catch (err) {
          result.innerHTML = `<div style="padding:16px"><span style="color:var(--red)">Error: ${escapeHtml(err.message)}</span></div>`;
          loading.style.display = "none";
          return;
        }
        loading.style.display = "none";
      }

      function renderBalances(data, container) {
        const TYPE_ORDER = ["wallet", "fireblocks"];
        const ENV_ORDER = Object.keys(data);
        let html = "";

        for (const env of ENV_ORDER) {
          const envData = data[env];
          if (!envData) continue;

          const explorerUrl = meta?.meta?.[env]?.settlement?.explorer || "";
          const appExplorerUrl = meta?.meta?.[env]?.app?.explorer || "";

          html += `<div class="detail-card">`;
          html += `<div class="detail-card-header">${escapeHtml(env)}</div>`;
          html += `<div class="detail-card-body"><div class="table-wrapper"><table>`;
          html += `<thead>
            <tr>
              <th>Type</th>
              <th>Role</th>
              <th>Address</th>
              <th style="text-align:right">ETH (Base L2)</th>
              <th style="text-align:right">xUSD (Base L2)</th>
              <th style="text-align:right">xUSD (App Chain L3)</th>
            </tr>
          </thead><tbody>`;

          const orderedTypes = TYPE_ORDER.filter((t) => envData[t]).concat(
            Object.keys(envData).filter((t) => !TYPE_ORDER.includes(t)),
          );

          for (const signingType of orderedTypes) {
            const roles = envData[signingType];
            if (!roles) continue;
            for (const [role, info] of Object.entries(roles)) {
              const wrapL2 = (html) =>
                explorerUrl && info.address
                  ? `<a href="${explorerUrl}/address/${info.address}" target="_blank" rel="noopener" class="balance-link">${html}</a>`
                  : html;
              const wrapL3 = (html) =>
                appExplorerUrl && info.address
                  ? `<a href="${appExplorerUrl}/address/${info.address}" target="_blank" rel="noopener" class="balance-link">${html}</a>`
                  : html;
              html += `<tr>
                <td style="font-family:var(--mono);color:var(--text-dim)">${escapeHtml(signingType)}</td>
                <td class="contract-name">${escapeHtml(role)}</td>
                <td>${renderAddress(info.address)}</td>
                <td style="text-align:right">${wrapL2(formatEth(info.ethBalance))}</td>
                <td style="text-align:right">${wrapL2(formatToken(info.underlyingBalance, info.underlyingDecimals))}</td>
                <td style="text-align:right">${wrapL3(formatToken(info.feeTokenBalance, info.feeTokenDecimals))}</td>
              </tr>`;
            }
          }

          html += `</tbody></table></div></div></div>`;
        }

        container.innerHTML = html;
      }

        html += `<div class="table-wrapper"><table>
    <thead><tr>
      <th>Contract</th>
      <th>Chain</th>
      <th>Config Implementation</th>
      <th>On-Chain Implementation</th>
      <th>Status</th>
    </tr></thead><tbody>`;

        for (const row of data.implementationComparison) {
          html += `<tr>
      <td class="contract-name">${escapeHtml(row.label)}</td>
      <td>${escapeHtml(row.chain)}</td>
      <td>${renderAddress(row.configImplementation)}</td>
      <td>${renderAddress(row.onChainImplementation)}</td>

        html += `</tbody></table></div>`;

        container.innerHTML = html;
      }
      */

      // ---- Init ----
      // Populate selectors independently so inspector tab works
      // even if version loading is slow or fails
      const hashParams = getHashParams();
      const rawTab = hashParams.get("tab") || "status";
      const initialTab = VALID_TABS.has(rawTab) ? rawTab : "status";

      fetch("/api/meta")
        .then((r) => r.json())
        .then((m) => {
          meta = m;
          populateSelectors(m);

          // Restore inspector selections from hash
          if (initialTab === "inspector") {
            const env = hashParams.get("env");
            const contract = hashParams.get("contract");
            if (env) {
              document.getElementById("inspector-env").value = env;
              populateContractDropdown(env);
              if (contract) {
                document.getElementById("inspector-contract").value = contract;
                loadContractDetails();
              }
            }
          }
        });

      switchToTab(initialTab);
      if (initialTab === "status") loadVersions();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
